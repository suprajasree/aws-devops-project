name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # STEP 3: Build and Push Docker Image
      - name: Build & Push Docker Image
        run: |
          docker build -t csuprajavani/aws-devops-app:v1 .
          docker push csuprajavani/aws-devops-app:v1

      # STEP 4: Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Pulling latest image..."
            sudo docker pull csuprajavani/aws-devops-app:v1

            echo "Stopping old container if exists..."
            sudo docker stop app || true

            echo "Removing old container if exists..."
            sudo docker rm app || true

            echo "Running new container..."
            sudo docker run -d -p 5000:5000 --name app csuprajavani/aws-devops-app:v1

            echo "Deployment successful 🚀"
  
       