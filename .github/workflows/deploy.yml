name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Docker Image
      run: |
        docker build -t csuprajavani/aws-devops-app:v1 .
        docker push csuprajavani/aws-devops-app:v1

   - name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_KEY }}
    script: |
      sudo docker pull csuprajavani/aws-devops-app:v1

      # STOP any container using port 5000
      sudo docker ps -q --filter "publish=5000" | xargs -r sudo docker stop
      sudo docker ps -aq --filter "publish=5000" | xargs -r sudo docker rm

      # Run fresh container
      sudo docker run -d -p 5000:5000 --name app csuprajavani/aws-devops-app:v1
       